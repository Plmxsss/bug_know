name: agriguard

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${AGRIGUARD_MYSQL_DATABASE:?Set AGRIGUARD_MYSQL_DATABASE in .env}
      MYSQL_USER: ${AGRIGUARD_MYSQL_USER:?Set AGRIGUARD_MYSQL_USER in .env}
      MYSQL_PASSWORD: ${AGRIGUARD_MYSQL_PASSWORD:?Set AGRIGUARD_MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${AGRIGUARD_MYSQL_ROOT_PASSWORD:?Set AGRIGUARD_MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "${AGRIGUARD_MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping --host=127.0.0.1 --user=root --password=$$MYSQL_ROOT_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.18.3
    restart: unless-stopped
    ports:
      - "${AGRIGUARD_QDRANT_HTTP_PORT:-6333}:6333"
      - "${AGRIGUARD_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/6333'"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:8.4.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${AGRIGUARD_REDIS_PASSWORD:?Set AGRIGUARD_REDIS_PASSWORD in .env}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${AGRIGUARD_REDIS_PORT:-7379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep PONG
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mysql_data:
  qdrant_data:
  redis_data:
